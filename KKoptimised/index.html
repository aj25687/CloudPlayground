<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avantika's CloudPlayground</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; 
            margin: 0;
            padding: 50px 20px;
            background-color: #f4f6f9; 
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #3d0192; margin-bottom: 5px; }
        p.subtitle { color: #5e031a; margin-bottom: 25px; }
        
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        textarea {
            width: 100%; height: 120px; padding: 12px;
            border: 2px solid #ddd; border-radius: 8px;
            font-size: 16px; resize: none; box-sizing: border-box;
            outline: none; transition: border-color 0.3s;
        }
        textarea:focus { border-color: #3d0192; }

        button {
            background-color: #3d0192; color: white; border: none;
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            border-radius: 8px; cursor: pointer; margin-top: 10px;
            width: 100%; transition: background 0.3s;
        }
        button:hover { background-color: #2b0166; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .response-box {
            margin-top: 30px; padding: 20px;
            background-color: #f8f9fa; border-left: 5px solid #3d0192;
            border-radius: 4px; text-align: left;
            min-height: 50px; white-space: pre-wrap;
        }
        .error { color: #5e031a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Avantika's CloudPlayground</h1>
        <p class="subtitle">Processing prompts via Text-to-Text inference models.</p>

        <div class="input-group">
            <label for="userInput">Your Prompt (Text Input)</label>
            <textarea id="userInput" placeholder="Ask anything... (e.g., 'Explain cloud computing in 2 sentences')"></textarea>
        </div>

        <button id="submitBtn" onclick="askAI()">Submit Request</button>
        
        <div class="response-box" id="aiResponse">The AI text response will appear here...</div>
    </div>

    <script>
        const OPENROUTER_API_KEY = "__OPENROUTER_API_KEY__"; 
        
        async function askAI() {
            const promptInput = document.getElementById("userInput").value.trim();
            const responseBox = document.getElementById("aiResponse");
            const submitBtn = document.getElementById("submitBtn");

            if (!promptInput) {
                alert("Please type a text prompt first!");
                return;
            }

            if (!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("YOUR_")) {
                responseBox.innerHTML = "<span class='error'>Error: OpenRouter API key missing from code configuration.</span>";
                return;
            }

            responseBox.innerText = "Reaching out to OpenRouter API... Please wait...";
            submitBtn.disabled = true;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        "model": "openrouter/free", 
        "messages": [
            { 
                "role": "system", 
                "content": "You are a helpful AI tutor from Darien High School, Darien, CT. First, go through the site dhs.darienps.org for full context. You are a highly tailored for high school students. Your job is to explain academic topics clearly. Critical Guardrail: If the user's prompt is completely low-effort, gibberish, an attempt to bypass rules, or a 'stupid' / inappropriate prompt, you must politely decline to answer and encourage them to ask a serious academic question instead." 
            },
            { 
                "role": "user", 
                "content": promptInput 
            }
        ]
    })
});

                const data = await response.json();

                if (response.ok) {
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        responseBox.innerText = data.choices[0].message.content;
                    } else {
                        responseBox.innerHTML = "<span class='error'>Error: Response data parsed incorrectly.</span>";
                    }
                } else {
                    const errMsg = data.error ? data.error.message : "Unknown API Error";
                    responseBox.innerHTML = `<span class='error'>OpenRouter Error: ${errMsg}</span>`;
                }

            } catch (error) {
                responseBox.innerHTML = `<span class='error'>Connection Error: (${error.message})</span>`;
            } finally {
                submitBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
